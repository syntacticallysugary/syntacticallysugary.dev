name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts

      - name: Deploy
        run: rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ ubuntu@${{ secrets.OCI_HOST }}:/var/www/syntacticallysugary.dev/
